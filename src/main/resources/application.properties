spring.application.name=PriceTracker

spring.datasource.url=jdbc:postgresql://localhost:5432/pricetracker
spring.datasource.username=mixeld
spring.datasource.password=12062006
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-

logging.file.name=/home/Mixeld/IdeaProjects/pricemonitor/logs/pricetracker.log
logging.logback.rollingpolicy.max-file-size=5KB
logging.logback.rollingpolicy.max-history=2
logging.logback.rollingpolicy.file-name-pattern=/home/Mixeld/IdeaProjects/pricemonitor/logs/pricetracker-%d{yyyy-MM-dd}-%i.log.gz
logging.logback.rollingpolicy.total-size-cap=100KB

logging.level.root=INFO
logging.level.com.pricetracker=DEBUG
logging.level.com.pricetracker.service.AsyncTaskService=DEBUG
logging.level.com.pricetracker.service.RaceConditionDemoService=DEBUG
logging.level.com.pricetracker.service.LoadTestService=INFO

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.mvc.async.request-timeout=60000
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Moscow