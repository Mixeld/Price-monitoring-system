spring.application.name=PriceTracker

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pricetracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

spring.task.execution.pool.core-size=${APP_TASK_CORE_SIZE:10}
spring.task.execution.pool.max-size=${APP_TASK_MAX_SIZE:20}
spring.task.execution.pool.queue-capacity=${APP_TASK_QUEUE_CAPACITY:100}
spring.task.execution.thread-name-prefix=${APP_TASK_THREAD_PREFIX:async-task-}

spring.servlet.multipart.max-file-size=${APP_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${APP_MAX_REQUEST_SIZE:10MB}
spring.mvc.async.request-timeout=${APP_ASYNC_TIMEOUT:60000}
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=${APP_TIME_ZONE:Europe/Moscow}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.pricetracker=${LOG_LEVEL_APP:DEBUG}
logging.level.com.pricetracker.service.AsyncTaskService=${LOG_LEVEL_ASYNC:DEBUG}
logging.level.com.pricetracker.service.RaceConditionDemoService=${LOG_LEVEL_RACE:DEBUG}
logging.level.com.pricetracker.service.LoadTestService=${LOG_LEVEL_LOADTEST:INFO}