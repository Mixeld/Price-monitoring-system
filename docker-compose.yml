services:
  db:
    image: postgres:16
    container_name: pricetracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pricetracker}
      POSTGRES_USER: ${POSTGRES_USER:-pricetracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pricetracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pricetracker} -d ${POSTGRES_DB:-pricetracker}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pricetracker-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-pricetracker}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pricetracker}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pricetracker}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      LOG_PATH: /app/logs
      JAVA_OPTS: -XX:MaxRAMPercentage=75.0
    ports:
      - "8081:8080"
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  app_logs: